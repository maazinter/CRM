<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAAZ Core CRM Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Custom Scrollbar styles */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    /* Fallback styles to ensure proper rendering */
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      background-color: #0f172a;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, 
      onAuthStateChanged, 
      signInAnonymously, 
      signInWithCustomToken,
      signOut 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, 
      collection, 
      doc, 
      addDoc, 
      onSnapshot, 
      query, 
      updateDoc, 
      deleteDoc 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
    import { 
      Users, UserPlus, LayoutDashboard, LogOut, PlusCircle, Calendar, 
      CreditCard, ShieldCheck, ClipboardList, Edit, Trash2, Briefcase, 
      Lock, MapPin, UserCheck, Wallet, UserCog, Mail, User, Phone, 
      CheckCircle2, Clock, AlertCircle, Check, X, ThumbsUp, ThumbsDown, 
      TrendingUp, Award, Zap, KeyRound, ShieldAlert, UserCircle2, 
      Activity, ArrowUpRight 
    } from 'https://esm.sh/lucide-react@0.294.0';

    // --- Firebase Configuration ---
    // Safe fallback check for global config variables
    const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{"projectId":"demo-project"}';
    const firebaseConfig = JSON.parse(configStr);
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'crm-agent-portal';

    const ROLES = { AGENT: 'agent', MANAGER: 'manager', ADMIN: 'admin' };
    const LEAVE_TYPES = ["Present", "Festival Leave", "Holiday", "Casual Leave", "Paid Leave", "Unplanned Leave", "Saturday Leave"];

    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [sessionUser, setSessionUser] = useState(null);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [leads, setLeads] = useState([]);
      const [agentsList, setAgentsList] = useState([]);
      const [attendance, setAttendance] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isDirectorySynced, setIsDirectorySynced] = useState(false);
      const [editingLead, setEditingLead] = useState(null);

      // Auth Initialization
      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (err) { console.error("Firebase Auth initialization error:", err); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (user) => {
          setFirebaseUser(user);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // Fetch Agents Directory (Needed for Login Validation)
      useEffect(() => {
        if (!firebaseUser) return;
        const agentsQuery = query(collection(db, 'artifacts', appId, 'public', 'data', 'agents'));
        const unsubscribe = onSnapshot(agentsQuery, (snapshot) => {
          setAgentsList(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
          setIsDirectorySynced(true); // Directory is ready for login validation
        }, (err) => {
          console.error("Firestore Error Agents:", err);
          setIsDirectorySynced(true); // Set to true even on error to prevent total lock
        });
        return () => unsubscribe();
      }, [firebaseUser]);

      // Fetch Leads and Attendance only when a CRM session is active
      useEffect(() => {
        if (!firebaseUser || !sessionUser) return;
        const leadsQuery = query(collection(db, 'artifacts', appId, 'public', 'data', 'leads'));
        const unsubscribeLeads = onSnapshot(leadsQuery, (snapshot) => {
          setLeads(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => console.error("Firestore Error Leads:", err));
        
        const attendanceQuery = query(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'));
        const unsubscribeAttendance = onSnapshot(attendanceQuery, (snapshot) => {
          setAttendance(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (err) => console.error("Firestore Error Attendance:", err));
        
        return () => { unsubscribeLeads(); unsubscribeAttendance(); };
      }, [firebaseUser, sessionUser]);

      const stats = useMemo(() => {
        const defaultStats = { todaySalesCount: 0, upcomingCount: 0, totalLeads: 0, totalVolume: 0, visibleLeads: [], activeAgentsCount: agentsList.length, presentTodayCount: 0, performance: [] };
        if (!sessionUser) return defaultStats;
        const todayStr = new Date().toISOString().split('T')[0];
        const visibleLeads = sessionUser.role === ROLES.AGENT 
          ? leads.filter(l => l.agentId === sessionUser.uid || l.agentId === sessionUser.agentId) 
          : leads;
        const todaySales = visibleLeads.filter(l => l.paymentDate === todayStr && l.status === 'Sale');
        const upcomingEnrollments = visibleLeads.filter(l => l.paymentDate > todayStr);
        const totalFees = visibleLeads.reduce((sum, l) => sum + Number(l.fees || 0), 0);
        const presentTodayCount = attendance.filter(a => a.date === todayStr && a.type === 'Present' && a.status === 'Approved').length;
        const performance = agentsList.map(agent => {
            const agentSales = leads.filter(l => (l.agentId === agent.agentId || l.agentId === agent.id) && l.status === 'Sale').length;
            return { name: agent.name, sales: agentSales, id: agent.id };
        }).sort((a, b) => b.sales - a.sales).slice(0, 5);
        return { todaySalesCount: todaySales.length, upcomingCount: upcomingEnrollments.length, totalLeads: visibleLeads.length, totalVolume: totalFees, visibleLeads, activeAgentsCount: agentsList.length, presentTodayCount, performance };
      }, [leads, sessionUser, agentsList, attendance]);

      const handleLogin = async (userId, password, selectedRole) => {
        if (selectedRole === ROLES.ADMIN) {
          if (userId === "Maaz" && password === "Maaz") {
            setSessionUser({ uid: 'admin-maaz', name: 'Admin Maaz', role: ROLES.ADMIN });
            return { success: true };
          } else return { success: false, message: "Invalid Administrator credentials" };
        }
        const foundStaff = agentsList.find(a => a.agentId === userId && a.password === password && a.role === selectedRole);
        if (foundStaff) {
          setSessionUser({ uid: foundStaff.id, agentId: foundStaff.agentId, name: foundStaff.name, role: foundStaff.role });
          return { success: true };
        }
        return { success: false, message: `Invalid ${selectedRole} credentials` };
      };

      const handleLogout = () => { setSessionUser(null); setCurrentPage('dashboard'); };

      const handleSaveLead = async (formData) => {
        if (!sessionUser || !firebaseUser) return;
        const today = new Date().toISOString().split('T')[0];
        const status = formData.paymentDate === today ? 'Sale' : 'Enrollment';
        const leadData = { ...formData, status, agentId: sessionUser.agentId || sessionUser.uid, agentName: sessionUser.name, updatedAt: new Date().toISOString() };
        try {
          if (editingLead) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leads', editingLead.id), leadData);
          } else { 
            leadData.createdAt = new Date().toISOString(); 
            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'leads'), leadData); 
          }
          setCurrentPage('dashboard'); 
          setEditingLead(null);
        } catch (err) { console.error("Save error", err); }
      };

      const handleLogAttendance = async (attendanceData) => {
        if (!sessionUser || !firebaseUser) return;
        try { 
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'attendance'), { 
            ...attendanceData, 
            agentId: sessionUser.agentId || sessionUser.uid, 
            agentName: sessionUser.name, 
            status: 'Pending', 
            createdAt: new Date().toISOString() 
          }); 
        } catch (err) { console.error("Attendance log error", err); }
      };

      const handleUpdateAttendanceStatus = async (id, status) => {
        if (sessionUser?.role === ROLES.AGENT || !firebaseUser) return;
        try { 
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'attendance', id), { 
            status, 
            reviewedBy: sessionUser.uid, 
            reviewedAt: new Date().toISOString() 
          }); 
        } catch (err) { console.error("Attendance update error", err); }
      };

      const handleOnboardAgent = async (agentData) => {
        if (!firebaseUser) return;
        try { 
          await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'agents'), { 
            ...agentData, 
            createdAt: new Date().toISOString() 
          }); 
        } catch (err) { console.error("Onboarding error", err); }
      };

      const handleDeleteAgent = async (id) => {
        if (!firebaseUser) return;
        if (window.confirm("Remove this staff member?")) {
            await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'agents', id));
        }
      };

      const handleDeleteLead = async (id) => {
        if (sessionUser?.role !== ROLES.ADMIN || !firebaseUser) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'leads', id));
      };

      if (loading) return (
        <div className="flex flex-col items-center justify-center h-screen bg-[#0f172a] text-white">
            <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-blue-500 mb-6"></div>
            <p className="animate-pulse tracking-widest uppercase text-xs font-bold text-blue-400">Connecting to Maaz Core...</p>
        </div>
      );
      if (!sessionUser) return <LoginForm onLogin={handleLogin} isDirectoryReady={isDirectorySynced} />;

      return (
        <div className="flex h-screen bg-[#f8fafc] text-slate-900 font-sans overflow-hidden">
          {/* Sidebar - Professional Slate Theme */}
          <aside className="w-72 bg-[#0f172a] flex flex-col shadow-2xl relative z-10">
            <div className="p-8 border-b border-white/5">
              <div className="flex items-center gap-3 mb-2 text-left">
                <div className="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-600/20"><ShieldCheck className="w-6 h-6 text-white" /></div>
                <h1 className="text-xl font-black text-white tracking-tighter leading-tight uppercase">MAAZ<br/><span className="text-blue-400 font-light text-sm uppercase tracking-[0.2em]">International</span></h1>
              </div>
            </div>
            
            <nav className="flex-1 p-6 space-y-2 overflow-y-auto custom-scrollbar">
              <NavItem active={currentPage === 'dashboard'} onClick={() => setCurrentPage('dashboard')} icon={<LayoutDashboard size={20}/>} label="Executive View" />
              <NavItem active={currentPage === 'add_lead'} onClick={() => { setEditingLead(null); setCurrentPage('add_lead'); }} icon={<UserPlus size={20}/>} label="New Registration" />
              {(sessionUser.role === ROLES.MANAGER || sessionUser.role === ROLES.ADMIN) && (
                <NavItem active={currentPage === 'all_leads'} onClick={() => setCurrentPage('all_leads')} icon={<ClipboardList size={20}/>} label="Lead Registry" />
              )}
              <NavItem active={currentPage === 'attendance'} onClick={() => setCurrentPage('attendance')} icon={<Activity size={20}/>} label="Operational Logs" />
              {sessionUser.role === ROLES.ADMIN && (
                <NavItem active={currentPage === 'onboarding'} onClick={() => setCurrentPage('onboarding')} icon={<UserCog size={20}/>} label="Team HQ" />
              )}
            </nav>

            <div className="p-6 bg-white/5 border-t border-white/5">
              <div className="flex items-center gap-4 p-4 rounded-2xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300">
                <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-blue-600 to-blue-400 text-white flex items-center justify-center font-bold shadow-lg text-lg">
                  {sessionUser.name?.[0]?.toUpperCase()}
                </div>
                <div className="truncate flex-1 text-left">
                  <p className="font-bold text-white text-sm tracking-tight">{sessionUser.name}</p>
                  <p className="text-[10px] text-blue-400 font-black uppercase tracking-widest">{sessionUser.role}</p>
                </div>
              </div>
              <button onClick={handleLogout} className="flex items-center gap-2 text-white/40 hover:text-red-400 transition-all text-xs w-full p-4 mt-2 font-bold uppercase tracking-widest">
                <LogOut size={16} /> Secure Logout
              </button>
            </div>
          </aside>

          {/* Main Content Area */}
          <main className="flex-1 overflow-y-auto p-12 transition-all duration-500 bg-[#f8fafc]">
            <div className="max-w-7xl mx-auto animate-in fade-in slide-in-from-bottom-4 duration-700">
              {currentPage === 'dashboard' && <Dashboard stats={stats} role={sessionUser.role} userName={sessionUser.name} onEdit={(l) => { setEditingLead(l); setCurrentPage('add_lead'); }} onDelete={handleDeleteLead} />}
              {currentPage === 'add_lead' && <LeadForm onSave={handleSaveLead} onCancel={() => setCurrentPage('dashboard')} initialData={editingLead} />}
              {currentPage === 'all_leads' && <LeadTable leads={stats.visibleLeads} role={sessionUser.role} onEdit={(l) => { setEditingLead(l); setCurrentPage('add_lead'); }} onDelete={handleDeleteLead} />}
              {currentPage === 'onboarding' && sessionUser.role === ROLES.ADMIN && <AgentOnboarding agents={agentsList} onOnboard={handleOnboardAgent} onDelete={handleDeleteAgent} />}
              {currentPage === 'attendance' && <Attendance role={sessionUser.role} currentUserId={sessionUser.agentId || sessionUser.uid} attendance={attendance} onLog={handleLogAttendance} onStatusUpdate={handleUpdateAttendanceStatus} />}
            </div>
          </main>
        </div>
      );
    }

    function NavItem({ icon, label, active, onClick }) {
      return (
        <button onClick={onClick} className={`flex items-center gap-4 w-full p-4 rounded-2xl transition-all duration-300 group ${active ? 'bg-blue-600 text-white shadow-xl shadow-blue-600/20' : 'text-white/50 hover:bg-white/5 hover:text-white'}`}>
          <span className={`${active ? 'scale-110' : 'group-hover:scale-110'} transition-transform duration-300`}>{icon}</span>
          <span className="text-sm font-bold tracking-tight">{label}</span>
          {active && <ArrowUpRight className="ml-auto w-4 h-4 opacity-50" />}
        </button>
      );
    }

    function Dashboard({ stats, role, userName, onEdit, onDelete }) {
      const today = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
      return (
        <div className="space-y-12 text-left">
          <header className="flex justify-between items-start">
            <div className="space-y-1">
              <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Portal <span className="text-blue-600">Console</span></h2>
              <p className="text-slate-400 font-medium tracking-tight uppercase text-[10px] tracking-[0.2em]">Enterprise Overview for <span className="text-blue-600 font-bold">{userName}</span> &bull; {today}</p>
            </div>
            <div className="bg-white p-2 rounded-2xl shadow-sm border border-slate-100 flex gap-2">
                <span className="px-4 py-2 bg-blue-600 text-white rounded-xl text-[10px] font-black uppercase shadow-lg shadow-blue-600/20">{role} Authorized</span>
                <span className="px-4 py-2 bg-slate-50 text-slate-400 rounded-xl text-[10px] font-black uppercase">Live Core</span>
            </div>
          </header>

          <section>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                <StatCard title="Daily Sales" value={stats.todaySalesCount} subtitle="Validated Conversions" icon={<Zap size={20}/>} color="from-green-500 to-emerald-600" />
                <StatCard title="Active Pipeline" value={stats.upcomingCount} subtitle="Pending Enrollments" icon={<Calendar size={20}/>} color="from-blue-500 to-indigo-600" />
                <StatCard title="Total Customers" value={stats.totalLeads} subtitle="Managed Global" icon={<Users size={20}/>} color="from-slate-700 to-slate-900" />
                <StatCard title="Net Revenue" value={`$${(stats.totalVolume || 0).toLocaleString()}`} subtitle="Aggregate Portfolio" icon={<TrendingUp size={20}/>} color="from-blue-600 to-blue-800" />
            </div>
          </section>

          {(role === ROLES.ADMIN || role === ROLES.MANAGER) && (
            <div className="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div className="lg:col-span-2">
                    <div className="bg-white rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden">
                        <div className="p-10 text-left">
                            <div className="flex justify-between items-center mb-10">
                                <h3 className="text-lg font-black text-slate-800 uppercase tracking-tighter flex items-center gap-3"><Award className="text-blue-600" /> Performance Leaderboard</h3>
                                <div className="flex items-center gap-2"><div className="w-2 h-2 bg-blue-600 rounded-full animate-pulse"></div><span className="text-[10px] font-black uppercase text-blue-600 tracking-widest">Real-time Ranking</span></div>
                            </div>
                            {stats.performance.length === 0 ? <p className="text-slate-400 italic text-sm text-center py-12">No staff activity data available.</p> : (
                                <div className="space-y-8">
                                    {stats.performance.map((agent, idx) => (
                                        <div key={agent.id || idx} className="flex items-center gap-6 group">
                                            <div className={`w-12 h-12 rounded-2xl flex items-center justify-center font-black text-sm shadow-inner ${idx === 0 ? 'bg-blue-600 text-white scale-110 shadow-blue-500/40' : 'bg-slate-50 text-slate-400'}`}>#{idx + 1}</div>
                                            <div className="flex-1">
                                                <div className="flex justify-between items-center mb-3">
                                                    <span className="font-bold text-slate-800 tracking-tight group-hover:text-blue-600 transition-colors uppercase text-sm">{agent.name}</span>
                                                    <span className="font-black text-blue-600 text-sm tabular-nums tracking-widest">{agent.sales} units</span>
                                                </div>
                                                <div className="w-full bg-slate-100 h-3 rounded-full overflow-hidden shadow-inner">
                                                    <div 
                                                        className={`h-full rounded-full transition-all duration-1000 ${idx === 0 ? 'bg-gradient-to-r from-blue-600 to-blue-400 shadow-lg' : 'bg-slate-400'}`} 
                                                        style={{ width: `${Math.min((agent.sales / (Math.max(...stats.performance.map(p => p.sales)) || 1)) * 100, 100)}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
                <div className="space-y-8">
                    <div className="bg-slate-900 p-10 rounded-[40px] text-white shadow-2xl relative overflow-hidden group">
                        <div className="absolute top-0 right-0 p-8 opacity-10 group-hover:scale-125 transition-transform duration-1000"><UserCog size={120} /></div>
                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-400 mb-4">Personnel Count</p>
                        <p className="text-6xl font-black tracking-tighter tabular-nums mb-4 leading-none">{stats.activeAgentsCount}</p>
                        <p className="text-[10px] text-white/50 font-medium">Onboarded resource nodes.</p>
                    </div>
                    <div className="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100">
                        <div className="flex items-center justify-between mb-8">
                            <div className="bg-green-100 p-3 rounded-2xl"><CheckCircle2 className="text-green-600 w-6 h-6" /></div>
                            <p className="text-[10px] font-black text-green-600 uppercase tracking-widest bg-green-50 px-3 py-1 rounded-lg">Operational</p>
                        </div>
                        <p className="text-4xl font-black text-slate-800 tracking-tighter mb-2 leading-none uppercase">{stats.presentTodayCount} Online</p>
                        <p className="text-[10px] text-slate-400 font-bold mb-6 uppercase tracking-widest">Attendance Handshake</p>
                        <div className="w-full bg-slate-50 h-2 rounded-full overflow-hidden border border-slate-100"><div className="bg-green-500 h-full transition-all duration-1000" style={{ width: `${(stats.presentTodayCount / (stats.activeAgentsCount || 1)) * 100}%` }}></div></div>
                    </div>
                </div>
            </div>
          )}

          <section className="bg-white rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden text-left">
            <div className="p-10 border-b border-slate-50 flex justify-between items-center bg-slate-50/20">
              <h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] flex items-center gap-3"><Activity size={18} className="text-blue-600" /> Pipeline Registry</h3>
              <button className="p-3 bg-white border border-slate-100 rounded-2xl hover:shadow-lg transition-all"><ArrowUpRight size={16} className="text-blue-600"/></button>
            </div>
            <LeadTable leads={stats.visibleLeads.slice(0, 8)} role={role} onEdit={onEdit} onDelete={onDelete} />
          </section>
        </div>
      );
    }

    function StatCard({ title, value, subtitle, icon, color }) {
      return (
        <div className="bg-white p-8 rounded-[35px] shadow-2xl shadow-slate-200/40 border border-slate-100 hover:scale-[1.03] transition-all duration-500 group overflow-hidden relative text-left">
          <div className={`absolute top-0 right-0 w-32 h-32 bg-gradient-to-br ${color} opacity-[0.03] rounded-full -mr-12 -mt-12 transition-all duration-700 group-hover:scale-150`}></div>
          <div className={`w-14 h-14 rounded-[20px] flex items-center justify-center mb-8 shadow-xl bg-gradient-to-tr text-white transition-transform duration-500 group-hover:rotate-12 ${color}`}>
            {icon}
          </div>
          <h3 className="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mb-2">{title}</h3>
          <p className="text-4xl font-black text-slate-800 tracking-tighter tabular-nums mb-2 leading-none">{value}</p>
          <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest opacity-60">{subtitle}</p>
        </div>
      );
    }

    function LoginForm({ onLogin, isDirectoryReady }) {
      const [userId, setUserId] = useState('');
      const [password, setPassword] = useState('');
      const [selectedRole, setSelectedRole] = useState(ROLES.AGENT);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault(); setLoading(true); setError('');
        
        // Smooth check: If Admin, skip directory check. If not, check if directory sync is complete.
        if (selectedRole !== ROLES.ADMIN && !isDirectoryReady) { 
          setError("Synchronizing System Node... Please retry in a moment."); 
          setLoading(false); 
          return; 
        }

        const result = await onLogin(userId, password, selectedRole);
        if (!result.success) { setError(result.message); setLoading(false); }
      };

      return (
        <div className="min-h-screen bg-[#0f172a] flex items-center justify-center p-6 font-sans">
          <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 pointer-events-none"></div>
          <div className="max-w-xl w-full bg-white rounded-[48px] shadow-[0_50px_100px_-20px_rgba(0,0,0,0.5)] border border-white/10 overflow-hidden relative animate-in fade-in zoom-in duration-1000">
            <div className="bg-[#1e293b] p-12 text-center text-white relative">
              <div className="bg-blue-600 w-20 h-20 rounded-[28px] flex items-center justify-center mx-auto mb-8 shadow-2xl shadow-blue-500/40 rotate-3"><ShieldCheck size={40} /></div>
              <h2 className="text-4xl font-black tracking-tighter mb-2 uppercase leading-none">MAAZ</h2>
              <p className="text-blue-400 font-black text-[10px] uppercase tracking-[0.5em] opacity-80">Core Systems Login</p>
            </div>
            
            <div className="p-12 space-y-8">
              <div className="flex p-2 bg-slate-100 rounded-3xl border border-slate-200 shadow-inner">
                {[ROLES.ADMIN, ROLES.AGENT, ROLES.MANAGER].map(role => (
                  <button key={role} type="button" onClick={() => setSelectedRole(role)} className={`flex-1 py-3 text-xs font-black rounded-2xl transition-all uppercase tracking-widest ${selectedRole === role ? 'bg-white text-blue-600 shadow-xl' : 'text-slate-400 hover:text-slate-600'}`}>{role}</button>
                ))}
              </div>

              <form onSubmit={handleSubmit} className="space-y-6">
                {error && <div className="bg-red-50 text-red-600 p-5 rounded-3xl text-[10px] font-black flex items-center gap-3 border border-red-100 uppercase tracking-widest"><ShieldAlert size={18} /> {error}</div>}
                <div className="space-y-2 text-left">
                  <label className="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Identity Access Key</label>
                  <div className="relative group">
                    <User className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors" size={20} />
                    <input type="text" value={userId} onChange={(e) => setUserId(e.target.value)} className="w-full pl-16 pr-8 py-5 rounded-[24px] border-2 border-slate-100 outline-none text-sm font-bold transition-all focus:border-blue-600 focus:ring-8 focus:ring-blue-100 bg-slate-50/50" placeholder="Enter ID..." required />
                  </div>
                </div>
                <div className="space-y-2 text-left">
                  <label className="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2">Security Cipher</label>
                  <div className="relative group">
                    <KeyRound className="absolute left-6 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-blue-500 transition-colors" size={20} />
                    <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full pl-16 pr-8 py-5 rounded-[24px] border-2 border-slate-100 outline-none text-sm font-bold transition-all focus:border-blue-600 focus:ring-8 focus:ring-blue-100 bg-slate-50/50" placeholder="••••••••" required />
                  </div>
                </div>
                <button type="submit" disabled={loading} className="w-full bg-slate-900 hover:bg-blue-600 text-white font-black py-6 rounded-[28px] shadow-2xl shadow-blue-500/20 transition-all active:scale-[0.97] uppercase tracking-[0.3em] text-xs flex items-center justify-center gap-3 mt-4">
                  {loading ? <div className="animate-spin rounded-full h-5 w-5 border-b-2 border-white"></div> : 'Request Access'}
                </button>
              </form>
            </div>
          </div>
        </div>
      );
    }

    function Attendance({ role, currentUserId, attendance, onLog, onStatusUpdate }) {
      const [logType, setLogType] = useState('Present');
      const [logDate, setLogDate] = useState(new Date().toISOString().split('T')[0]);
      const [notes, setNotes] = useState('');
      const filteredAttendance = role === ROLES.AGENT ? attendance.filter(a => a.agentId === currentUserId) : attendance;
      const handleSubmit = (e) => { e.preventDefault(); onLog({ date: logDate, type: logType, notes }); setNotes(''); };
      const getStatusColor = (type) => {
        switch(type) {
          case 'Present': return 'bg-green-100 text-green-700';
          case 'Holiday': return 'bg-blue-100 text-blue-700';
          case 'Unplanned Leave': return 'bg-red-100 text-red-700';
          default: return 'bg-slate-100 text-slate-700';
        }
      };
      const getApprovalColor = (status) => {
        switch(status) {
          case 'Approved': return 'bg-green-500 text-white';
          case 'Rejected': return 'bg-red-500 text-white';
          default: return 'bg-slate-400 text-white';
        }
      };

      return (
        <div className="space-y-12 pb-12 animate-in fade-in duration-1000 text-left">
          <header className="space-y-2">
            <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Activity Logs</h2>
            <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em]">Operational Status Control Center</p>
          </header>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-12 text-left">
            <div className="lg:col-span-1">
              <div className="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 sticky top-12">
                <h3 className="text-lg font-black mb-10 flex items-center gap-3 text-blue-600 uppercase tracking-tighter leading-none"><Activity /> Log Request</h3>
                <form onSubmit={handleSubmit} className="space-y-8">
                  <div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2 font-black">Calendar Date</label><input type="date" value={logDate} onChange={(e) => setLogDate(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm font-bold focus:border-blue-600 bg-slate-50/30" required /></div>
                  <div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2 font-black">Status Key</label><select value={logType} onChange={(e) => setLogType(e.target.value)} className="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 bg-white outline-none text-sm font-black text-slate-800 transition-all focus:border-blue-600 uppercase tracking-widest">{LEAVE_TYPES.map(type => <option key={type} value={type}>{type}</option>)}</select></div>
                  <div className="space-y-3"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2 font-black">justification</label><textarea value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Personnel remarks..." className="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm font-medium focus:border-blue-600 bg-slate-50/30 h-32" /></div>
                  <button type="submit" className="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-500/20 transition-all uppercase tracking-widest text-xs">Execute Data Entry</button>
                </form>
              </div>
            </div>
            <div className="lg:col-span-2">
              <div className="bg-white rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden text-left">
                <div className="p-10 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center"><h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] flex items-center gap-3"><ClipboardList className="text-blue-600" /> Historic Logs</h3></div>
                <div className="overflow-x-auto text-left">
                  <table className="w-full text-left">
                    <thead className="bg-[#0f172a] text-white/50 text-[10px] uppercase tracking-[0.2em] font-black">
                      <tr><th className="px-10 py-6">Timestamp</th>{role !== ROLES.AGENT && <th className="px-10 py-6">Resource</th>}<th className="px-10 py-6 text-center">Protocol</th><th className="px-10 py-6 text-center">Auth Status</th><th className="px-10 py-6 text-right">Actions</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {filteredAttendance.sort((a, b) => new Date(b.date) - new Date(a.date)).map((record) => (
                        <tr key={record.id} className="hover:bg-slate-50 transition-colors group">
                          <td className="px-10 py-6 font-black text-slate-700 tabular-nums uppercase text-xs">{record.date}</td>
                          {role !== ROLES.AGENT && <td className="px-10 py-6 font-black text-blue-600 text-[10px] uppercase tracking-tighter">{record.agentName}</td>}
                          <td className="px-10 py-6 text-center"><span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest ${getStatusColor(record.type)} shadow-sm`}>{record.type}</span></td>
                          <td className="px-10 py-6 text-center"><span className={`px-4 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest ${getApprovalColor(record.status)} shadow-md`}>{record.status}</span></td>
                          <td className="px-10 py-6 text-right">
                            {role !== ROLES.AGENT && record.status === 'Pending' && (
                              <div className="flex justify-end gap-3">
                                <button onClick={() => onStatusUpdate(record.id, 'Approved')} className="p-3 bg-green-50 text-green-600 rounded-xl hover:bg-green-600 hover:text-white transition-all shadow-sm"><ThumbsUp size={16} /></button>
                                <button onClick={() => onStatusUpdate(record.id, 'Rejected')} className="p-3 bg-red-50 text-red-600 rounded-xl hover:bg-red-600 hover:text-white transition-all shadow-sm"><ThumbsDown size={16} /></button>
                              </div>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function AgentOnboarding({ agents, onOnboard, onDelete }) {
      const today = new Date().toISOString().split('T')[0];
      const [formData, setFormData] = useState({ name: '', email: '', phone: '', agentId: '', password: '', role: ROLES.AGENT, joiningDate: today });
      const handleSubmit = (e) => { e.preventDefault(); onOnboard(formData); setFormData({ name: '', email: '', phone: '', agentId: '', password: '', role: ROLES.AGENT, joiningDate: today }); };
      return (
        <div className="space-y-12 pb-12 animate-in fade-in duration-1000 text-left">
          <header className="space-y-2">
            <h2 className="text-4xl font-black text-slate-900 tracking-tighter uppercase leading-none">Team Core</h2>
            <p className="text-slate-400 font-bold uppercase text-[10px] tracking-[0.3em]">Resource Provisioning & HQ</p>
          </header>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-12 text-left">
            <div className="lg:col-span-1">
              <div className="bg-white p-10 rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 sticky top-12">
                <h3 className="text-lg font-black mb-10 flex items-center gap-3 text-blue-600 uppercase tracking-tighter leading-none"><UserPlus /> Provision Access</h3>
                <form onSubmit={handleSubmit} className="space-y-6">
                  <OnboardField label="Legal Full Name" icon={<User size={14}/>} value={formData.name} onChange={(v) => setFormData({...formData, name: v})} required />
                  <OnboardField label="Secure Mobile" icon={<Phone size={14}/>} value={formData.phone} onChange={(v) => setFormData({...formData, phone: v})} required />
                  <OnboardField label="Enterprise Mail ID" icon={<Mail size={14}/>} value={formData.email} onChange={(v) => setFormData({...formData, email: v})} required type="email" />
                  <div className="grid grid-cols-2 gap-6 text-left">
                    <OnboardField label="UID Key" icon={<Lock size={14}/>} value={formData.agentId} onChange={(v) => setFormData({...formData, agentId: v})} required placeholder="Enter ID..." />
                    <OnboardField label="Access PWD" icon={<KeyRound size={14}/>} value={formData.password} onChange={(v) => setFormData({...formData, password: v})} required type="password" />
                  </div>
                  <div className="grid grid-cols-2 gap-6 text-left">
                    <div className="space-y-2 text-left"><label className="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2 uppercase font-black">Tier</label><select value={formData.role} onChange={(e) => setFormData({...formData, role: e.target.value})} className="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none text-xs font-black uppercase tracking-widest bg-slate-50 focus:bg-white focus:border-blue-600 transition-all"><option value={ROLES.AGENT}>Agent Unit</option><option value={ROLES.MANAGER}>Manager Unit</option></select></div>
                    <OnboardField label="Join Date" icon={<Calendar size={12}/>} value={formData.joiningDate} onChange={(v) => setFormData({...formData, joiningDate: v})} required type="date" />
                  </div>
                  <button type="submit" className="w-full bg-slate-900 hover:bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl transition-all uppercase tracking-widest text-xs mt-4">Execute Provisioning</button>
                </form>
              </div>
            </div>
            <div className="lg:col-span-2 text-left">
              <div className="bg-white rounded-[40px] shadow-2xl shadow-slate-200/50 border border-slate-100 overflow-hidden text-left">
                <div className="p-10 border-b border-slate-50 bg-slate-50/30 flex justify-between items-center"><h3 className="text-xs font-black text-slate-500 uppercase tracking-[0.3em] flex items-center gap-3"><Users className="text-blue-600" /> Resource Directory</h3></div>
                <div className="overflow-x-auto text-left">
                  <table className="w-full text-left">
                    <thead className="bg-[#0f172a] text-white/50 text-[10px] uppercase tracking-[0.3em] font-black">
                      <tr><th className="px-10 py-6">Personnel Details</th><th className="px-10 py-6 text-center">Unit Tier</th><th className="px-10 py-6 text-center">Access Code</th><th className="px-10 py-6 text-right">Actions</th></tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {agents.map((agent) => (
                        <tr key={agent.id} className="hover:bg-slate-50 transition-colors group text-left">
                          <td className="px-10 py-6 text-left"><div className="font-black text-slate-800 tracking-tight text-sm uppercase">{agent.name}</div><div className="text-[10px] text-slate-400 font-bold uppercase">{agent.email}</div></td>
                          <td className="px-10 py-6 text-center"><span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest block w-fit mx-auto mb-2 ${agent.role === ROLES.MANAGER ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-slate-100 text-slate-600 border border-slate-200'}`}>{agent.role}</span><div className="text-[10px] text-slate-400 font-bold">{agent.agentId}</div></td>
                          <td className="px-10 py-6 text-center text-left"><span className="font-mono text-xs text-slate-300 bg-slate-50 px-3 py-1 rounded-lg">****</span></td>
                          <td className="px-10 py-6 text-right"><button onClick={() => onDelete(agent.id)} className="p-3 text-red-300 hover:text-red-600 hover:bg-red-50 rounded-2xl transition-all"><Trash2 size={18} /></button></td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function OnboardField({ label, icon, value, onChange, placeholder, type="text", required=false }) {
      return (
        <div className="space-y-2 text-left">
          <label className="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-2 flex items-center gap-2">{icon} {label}</label>
          <input type={type} value={value} onChange={(e) => onChange(e.target.value)} required={required} placeholder={placeholder} className="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm font-bold transition-all focus:border-blue-600 focus:bg-white bg-slate-50/50" />
        </div>
      );
    }

    function LeadTable({ leads, role, onEdit, onDelete }) {
      if (leads.length === 0) return <div className="p-20 text-center text-slate-400 italic text-sm font-black uppercase tracking-widest opacity-50">Transaction queue currently empty.</div>;
      return (
        <div className="overflow-x-auto text-left">
          <table className="w-full text-left">
            <thead className="bg-[#0f172a] text-white/50 text-[10px] uppercase tracking-[0.2em] font-black">
              <tr><th className="px-10 py-6 border-b border-white/5">Portfolio Lead</th><th className="px-10 py-6 border-b border-white/5">Protocol Status</th><th className="px-10 py-6 border-b border-white/5">Volume Metrics</th><th className="px-10 py-6 border-b border-white/5">Gross Fees</th><th className="px-10 py-6 border-b border-white/5">Date</th><th className="px-10 py-6 border-b border-white/5 text-right">Actions</th></tr>
            </thead>
            <tbody className="divide-y divide-slate-50 text-left">
              {leads.map((lead) => (
                <tr key={lead.id} className="hover:bg-blue-50/30 transition-all duration-300 group text-left">
                  <td className="px-10 py-8 text-left"><div className="font-black text-slate-800 tracking-tighter text-base leading-none mb-1 uppercase">{lead.name}</div><div className="text-[10px] text-slate-400 font-black uppercase tracking-widest">{lead.phone}</div></td>
                  <td className="px-10 py-8 text-left"><span className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase tracking-widest shadow-sm ${lead.status === 'Sale' ? 'bg-green-600 text-white shadow-green-500/20' : 'bg-blue-600 text-white shadow-blue-500/20'}`}>{lead.status}</span></td>
                  <td className="px-10 py-8 text-left"><div className="text-[9px] text-blue-600 font-black uppercase mb-1 tracking-widest">{lead.loanProcessor || 'Pending'}</div><div className="text-sm font-black text-slate-800 tracking-tighter tabular-nums">${Number(lead.loanAmount || 0).toLocaleString()}</div></td>
                  <td className="px-10 py-8 text-left font-black text-slate-800 text-sm tracking-tighter tabular-nums">${Number(lead.fees || 0).toLocaleString()}</td>
                  <td className="px-10 py-8 text-left text-slate-400 font-bold text-[11px] tabular-nums">{lead.paymentDate}</td>
                  <td className="px-10 py-8 text-right">
                    <div className="flex justify-end gap-3 opacity-0 group-hover:opacity-100 transition-all duration-300">
                      <button onClick={() => onEdit(lead)} className="p-3 bg-white text-blue-600 border border-slate-100 rounded-2xl hover:shadow-xl transition-all scale-90 hover:scale-100 flex items-center justify-center"><Edit size={18} /></button>
                      {role === ROLES.ADMIN && <button onClick={() => onDelete(lead.id)} className="p-3 bg-white text-red-500 border border-slate-100 rounded-2xl hover:shadow-xl transition-all scale-90 hover:scale-100 flex items-center justify-center"><Trash2 size={18} /></button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    function LeadForm({ onSave, onCancel, initialData }) {
      const [billingSameAsMailing, setBillingSameAsMailing] = useState(false);
      const [formData, setFormData] = useState(initialData || { name: '', phone: '', altPhone: '', email: '', dob: '', address: '', billingAddress: '', ssn: '', fsaUser: '', fsaPass: '', backupCode: '', fees: '', paymentDate: new Date().toISOString().split('T')[0], paymentType: 'One Shot', paymentMode: 'Credit Card', cardHolderName: '', cardNumber: '', cardExp: '', cardCvv: '', loanAmount: '', loanServicer: '', fileNumber: '', loanProcessor: 'P1', bestCallingTime: '' });
      const handleChange = (e) => { const { name, value } = e.target; setFormData(prev => ({ ...prev, [name]: value, billingAddress: (name === 'address' && billingSameAsMailing) ? value : (name === 'billingAddress' ? value : prev.billingAddress) })); };
      const toggleBilling = (e) => { setBillingSameAsMailing(e.target.checked); if (e.target.checked) setFormData(prev => ({ ...prev, billingAddress: prev.address })); };
      const handleSubmit = (e) => { e.preventDefault(); onSave(formData); };

      return (
        <div className="max-w-6xl mx-auto pb-20 animate-in slide-in-from-bottom-6 duration-700 text-left">
          <div className="bg-white rounded-[32px] shadow-2xl border border-slate-100 overflow-hidden text-left">
            <div className="bg-[#0f172a] p-10 text-white flex justify-between items-center shadow-lg"><h2 className="text-xl font-black flex items-center gap-3 uppercase tracking-tighter leading-none"><PlusCircle size={24} className="text-blue-500"/> {initialData ? 'Update Pipeline Entry' : 'New Transaction Entry'}</h2><button onClick={onCancel} className="text-white/60 hover:text-white transition-all text-3xl font-light">&times;</button></div>
            <form onSubmit={handleSubmit} className="p-12 space-y-12 bg-white text-left">
              <section className="text-left">
                <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-600 mb-8 flex items-center gap-2"><Users size={16}/> Customer Identification</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-left">
                  <Field label="Full Legal Name" name="name" value={formData.name} onChange={handleChange} required />
                  <Field label="Date of Birth" name="dob" type="date" value={formData.dob} onChange={handleChange} required />
                  <Field label="Government SSN" name="ssn" value={formData.ssn} onChange={handleChange} placeholder="XXX-XX-XXXX" />
                  <Field label="Secure Line" name="phone" value={formData.phone} onChange={handleChange} required />
                  <Field label="Alt. Mobile" name="altPhone" value={formData.altPhone} onChange={handleChange} />
                  <Field label="Email Address" name="email" type="email" value={formData.email} onChange={handleChange} />
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8 text-left">
                  <div className="text-left"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1 uppercase font-black"><MapPin size={12}/> Mailing Address</label><textarea name="address" value={formData.address} onChange={handleChange} rows="2" className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm transition-all focus:border-blue-600 focus:bg-blue-50/10 placeholder-slate-300 font-medium"/></div>
                  <div className="text-left"><div className="flex justify-between items-center mb-3 text-left"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1 uppercase font-black"><MapPin size={12}/> Billing Address</label><label className="text-[9px] font-black text-blue-600 flex items-center gap-2 cursor-pointer uppercase tracking-tighter"><input type="checkbox" checked={billingSameAsMailing} onChange={toggleBilling} className="rounded-md w-4 h-4 border-slate-300 text-blue-600 focus:ring-blue-500" /> Match Mailing</label></div><textarea name="billingAddress" value={formData.billingAddress} onChange={handleChange} disabled={billingSameAsMailing} rows="2" className={`w-full px-5 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm transition-all placeholder-slate-300 font-medium ${billingSameAsMailing ? 'bg-slate-50 text-slate-300 border-slate-100 italic' : 'focus:border-blue-600 focus:bg-blue-50/10'}`}/></div>
                </div>
              </section>
              
              <section className="bg-slate-50/50 p-10 rounded-[32px] border border-slate-100 text-left">
                <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-8 flex items-center gap-2"><Briefcase size={16}/> Professional Processing</h3>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-8 text-left"><Field label="Asset Volume ($)" name="loanAmount" type="number" value={formData.loanAmount} onChange={handleChange} /><Field label="Network Servicer" name="loanServicer" value={formData.loanServicer} onChange={handleChange} /><Field label="Global Ref #" name="fileNumber" value={formData.fileNumber} onChange={handleChange} /><div className="text-left"><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 flex items-center gap-1 uppercase font-black"><UserCheck size={12}/> Assigned Tier</label><select name="loanProcessor" value={formData.loanProcessor} onChange={handleChange} className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-white outline-none text-sm font-black transition-all focus:ring-4 focus:ring-blue-100"><option value="P1">Processor 1 (P1)</option><option value="P2">Processor 2 (P2)</option><option value="P3">Processor 3 (P3)</option></select></div></div>
              </section>

              <section className="bg-blue-600/5 p-10 rounded-[32px] border border-blue-100/50 text-left">
                <h3 className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-600 mb-8 flex items-center gap-2"><Wallet size={16}/> Financial Commitment</h3>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-8 text-left"><Field label="Plan Fee Scale ($)" name="fees" value={formData.fees} onChange={handleChange} type="number" required /><div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 uppercase font-black">Cycle Type</label><select name="paymentType" value={formData.paymentType} onChange={handleChange} className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-white outline-none text-sm font-black transition-all"><option>One Shot</option><option>Monthly Installments</option></select></div><div><label className="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 uppercase font-black">Mechanism</label><select name="paymentMode" value={formData.paymentMode} onChange={handleChange} className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 bg-white outline-none text-sm font-black transition-all"><option>Credit Card</option><option>Debit Card</option><option>ACH/Bank</option><option>Other</option></select></div><Field label="Deployment Alpha" name="paymentDate" value={formData.paymentDate} onChange={handleChange} type="date" required /></div>
              </section>

              <div className="flex gap-6 pt-10 border-t border-slate-100 text-left"><button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-200 transition-all active:scale-[0.98] uppercase tracking-[0.2em] text-xs">Execute Record Save</button><button type="button" onClick={onCancel} className="px-10 py-5 text-slate-400 font-black uppercase tracking-[0.2em] text-xs hover:text-slate-600 transition-all">Abort Request</button></div>
            </form>
          </div>
        </div>
      );
    }

    function Field({ label, name, value, onChange, placeholder, type = "text", required = false }) {
      return (
        <div className="text-left">
          <label className="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-3 tracking-[0.2em] uppercase font-black">{label}</label>
          <input type={type} name={name} value={value} onChange={onChange} required={required} placeholder={placeholder} className="w-full px-5 py-4 rounded-2xl border-2 border-slate-100 outline-none text-sm transition-all focus:border-blue-600 focus:bg-slate-50/50 font-bold placeholder-slate-300" />
        </div>
      );
    }

    // Render the React application
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
